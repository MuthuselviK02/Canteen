<!DOCTYPE html>
<html>
<head>
    <title>Order Test</title>
</head>
<body>
    <h1>Order Placement Test</h1>
    <button onclick="testLogin()">1. Login</button>
    <button onclick="testOrder()">2. Place Order</button>
    <div id="result"></div>

    <script>
        let authToken = null;

        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'superadmin@admin.com',
                        password: 'admin@1230'
                    })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Login Response:</h3>
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                if (data.access_token) {
                    authToken = data.access_token;
                    localStorage.setItem('canteen_token', authToken);
                    console.log('✅ Token saved');
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Login Error:</h3>
                    <p>${error.message}</p>
                `;
            }
        }
        
        async function testOrder() {
            if (!authToken) {
                document.getElementById('result').innerHTML = '<p>Please login first!</p>';
                return;
            }
            
            try {
                const orderData = {
                    items: [
                        {menu_item_id: 1, quantity: 2},
                        {menu_item_id: 2, quantity: 1}
                    ],
                    available_time: null
                };
                
                const response = await fetch('http://localhost:8000/api/orders/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(orderData)
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Order Response:</h3>
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                if (response.status === 200) {
                    console.log('✅ Order placed successfully!');
                    console.log('Order ID:', data.id);
                    console.log('Estimated time:', data.predicted_wait_time, 'minutes');
                }
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Order Error:</h3>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
